# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-template"
BBFILE_PATTERN_meta-template = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-template = "6"

LAYERDEPENDS_meta-template = "core"

LAYERSERIES_COMPAT_meta-template = "scarthgap"
