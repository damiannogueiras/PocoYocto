name: Build and Publish to Docker Hub

on:
  push:
    tags:
      - 'v*' # Se activa con etiquetas que empiecen por v (ej: v1.0)
    branches:
      - entorno # Se activa solo si el push (o tag) está relacionado con esta rama

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Entorno/Dockerfile
          push: true
          build-args: |
            YOCTO_PASS=${{ secrets.YOCTO_PASS }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/yocto-env:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/yocto-env:${{ github.ref_name }}
