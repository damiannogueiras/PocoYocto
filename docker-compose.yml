version: '3.9'

services:
  yocto:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        YOCTO_PASS: pocoyo
    image: damiannogueiras/pocoyocto-env:latest
    container_name: pocoyocto-rpi4-64
    
    # Configuración de terminal interactiva
    stdin_open: true
    tty: true

    # puertos para el toaster
    ports:
      - "8000:8000"
    
    # Volúmenes
    volumes:
      - ./metas:/home/yoctouser/yocto_projects/metas
      - ./metas-propias:/home/yoctouser/yocto_projects/metas-propias
      - yocto-output-rpi4-64:/home/yoctouser/yocto_output
      - build-rpi4-64:/home/yoctouser/yocto_projects/build

    working_dir: /home/yoctouser/yocto_projects
    
    # Mantiene el contenedor corriendo
    command: /bin/bash
    
    # Límites de recursos
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 10G
        reservations:
          cpus: '6'
          memory: 8G
    
    # Health check
    healthcheck:
      test: ["CMD", "test", "-d", "/home/yoctouser/yocto_projects"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Red personalizada
    networks:
      - yocto-network
    
    # Reinicio automático
    restart: unless-stopped
    
    # Variables de entorno
    environment:
      - YOCTO_BUILD_TYPE=minimal
      - SSTATE_DIR=/home/yoctouser/yocto_output/sstate-cache
      - DL_DIR=/home/yoctouser/yocto_output/downloads
      - TMPDIR=/home/yoctouser/yocto_output/tmp

networks:
  yocto-network:
    driver: bridge

volumes:
  build-rpi4-64:
    driver: local
  yocto-output-rpi4-64:
    driver: local
