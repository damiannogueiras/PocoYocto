version: '3.9'

services:
  yocto:
    build:
      context: ./Entorno
      dockerfile: Dockerfile
      args:
        YOCTO_PASS: yocto
    image: damiannogueiras/yocto-env:latest
    container_name: yocto-minimal
    
    # Configuración de terminal interactiva
    stdin_open: true
    tty: true
    
    # Volúmenes
    volumes:
      - ./yocto_projects:/home/yoctouser/yocto_projects
      # Opcional: cachés de compilación para mejor rendimiento
      - yocto-sstate-cache:/home/yoctouser/.yocto-cache
    
    working_dir: /home/yoctouser/yocto_projects
    
    # Mantiene el contenedor corriendo
    command: /bin/bash
    
    # Límites de recursos
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G
    
    # Health check
    healthcheck:
      test: ["CMD", "test", "-d", "/home/yoctouser/yocto_projects"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Red personalizada
    networks:
      - yocto-network
    
    # Reinicio automático
    restart: unless-stopped
    
    # Variables de entorno
    environment:
      - YOCTO_BUILD_TYPE=minimal

networks:
  yocto-network:
    driver: bridge

volumes:
  yocto-sstate-cache:
    driver: local
